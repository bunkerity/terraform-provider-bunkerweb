# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-GB"
tone_instructions: "Be direct, technical, and actionable. Cite exact lines. Prefer concrete guidance over vague suggestions. Use British English."
early_access: false

knowledge_base:
  opt_out: false
  web_search:
    enabled: false
  code_guidelines:
    enabled: true

code_generation:
  docstrings:
    language: "en-GB"

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  high_level_summary_instructions: |
    Summarise the PR by area: `internal/provider` (resources, data sources, ephemeral resources, the shared `bunkerWebClient`, and the in-memory fake API test server), `examples`, `templates`, generated `docs`, `tools`, `test-local`, and `.github`.
    Distinguish the typed CRUD layer (`*_resource.go`, `*_data_source.go`, `*_ephemeral_resource.go`) from the HTTP transport (`client.go`) and the shared converters (`terraform_conversion.go`).
    Always call out: new or changed resource/data-source/ephemeral/function types and whether they were registered in `provider.go`; provider or resource schema changes (and whether `make generate` was run so `docs/` and `examples/` stay in sync); state-handling changes (`RequiresReplace`, `UseStateForUnknown`, 404 -> `RemoveResource`); API client behaviour (auth, the `bunkerWebAPIEnvelope`, typed errors, TLS/`skip_tls_verify`, timeouts); security impact (API token / basic-auth credential handling, `BUNKERWEB_API_*` env fallbacks); and whether the fake server (`test_server_test.go`) and the unit/acceptance tests were updated.
    Keep the summary terse, technical, and suitable for maintainers reviewing a Terraform provider for a security-critical WAF.
  review_status: true
  review_details: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: false
  suggested_reviewers: false
  enable_prompt_for_ai_agents: true
  # Fun features — keep CodeRabbit cheerful
  poem: true
  in_progress_fortune: true
  commit_status: true
  fail_commit_status: false
  abort_on_close: true
  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 8
    base_branches:
      - "main"
    ignore_title_keywords:
      - "WIP"
      - "[WIP]"
      - "RFC"
      - "DO NOT REVIEW"
    ignore_usernames:
      - "dependabot[bot]"
      - "TheophileDiot"

  slop_detection:
    enabled: true
    label: "needs-review"

  pre_merge_checks:
    title:
      mode: "warning"
      requirements: |
        Use Conventional Commits or a concise "<area> - description" form consistent with the provider history.
        Examples: "feat: add bunkerweb_ban resource", "fix(client): handle 404 on service read", "docs: add getting started guide", "chore(deps): bump terraform-plugin-framework".
        Keep titles under ~70 characters; put detail in the description.
    description:
      mode: "warning"
    issue_assessment:
      mode: "off"
    docstrings:
      mode: "off"

  finishing_touches:
    # Acceptance tests are written against the in-memory fake API by contributors; auto-generated tests risk false confidence on a WAF provider.
    unit_tests:
      enabled: false

  path_filters:
    - "**"
    # docs/ is generated by terraform-plugin-docs (`make generate`); review the schemas, examples, and templates that produce it instead.
    - "!docs/**"
    - "!**/node_modules/**"
    - "!**/.venv/**"
    - "!**/venv/**"
    - "!**/__pycache__/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/*.min.js"
    - "!**/*.svg"
    - "!**/*.drawio"
    - "!**/*.patch*"
    - "!**/*.zip"
    - "!**/*.tar.gz"
    - "!.claude/**"
    - "!.gemini/**"

  path_instructions:
    - path: "internal/provider/**/*.go"
      instructions: |
        This is the entire Terraform provider, built on the Terraform Plugin Framework (`terraform-plugin-framework`), NOT the legacy SDKv2. Enforce framework idioms and the conventions in `CLAUDE.md`:
          - Use framework types (`types.String`, `types.Map`, ...), `resource.Resource`, `Schema`, and plan modifiers. Do not introduce SDKv2 APIs such as `schema.Resource` or `d.Get`. (`terraform-plugin-sdk/v2` is only an indirect dependency; do not flag its presence.)
          - Every resource/data source/ephemeral type follows the shared shape: a `...Model` struct with `tfsdk:"..."` tags, plus `Metadata`/`Schema`/`Configure`/`Create`/`Read`/`Update`/`Delete`/`ImportState` (mutation methods omitted for data sources and ephemeral resources), and a `populateFrom<Type>()` mapper from the API struct onto the model.
          - A new resource, data source, ephemeral resource, or function MUST be registered in the matching `Resources()`/`DataSources()`/`EphemeralResources()`/`Functions()` list in `provider.go`, or it will not load. Flag a new type that is not registered.
          - `Read` (and other CRUD paths) must treat a 404 as resource-gone: `errors.As(err, &apiErr)` with `apiErr.StatusCode == http.StatusNotFound` -> `resp.State.RemoveResource(ctx)`, not a hard error.
          - Immutable fields must use `RequiresReplace()`; computed-stable fields must use `UseStateForUnknown()`. Flag mutable fields marked immutable and vice versa.
          - Reuse the shared converters in `terraform_conversion.go` (`mapFromTerraform`/`mapToTerraform`) and the `optionalString`/`optionalInt`/`optionalBool` helpers (in `instance_resource.go`) for null/unknown handling rather than re-deriving them.
          - Propagate `ctx` to every client call. Surface diagnostics via `resp.Diagnostics` with actionable messages; do not swallow errors.
          - Never log or echo API tokens, basic-auth credentials, or `Authorization` headers. Keep secrets out of state, plan output, and diagnostics.
          - When a schema or example changes, the PR must run `make generate` so `docs/` stays in sync (CI fails on a stale diff).

    - path: "internal/provider/client.go"
      instructions: |
        `client.go` is the single `bunkerWebClient` wrapping all HTTP to the BunkerWeb API:
          - Every response is a `bunkerWebAPIEnvelope` (`{status, message, data}`); a non-2xx or non-ok status must become a typed `*bunkerWebAPIError` carrying `StatusCode`. Preserve this so resources can detect 404s.
          - Auth is Bearer `api_token`, or Basic auth exchanged for a token via `Login()`. Do not weaken token handling or leak credentials into logs or error strings.
          - `skip_tls_verify` must stay the explicit opt-in it already is; never disable TLS verification by default. Set explicit timeouts on outbound HTTP and avoid unbounded retries.
          - New API calls should be methods here returning typed request/response structs (e.g. `ServiceCreateRequest`, `bunkerWebService`), consistent with the existing pattern.
          - Always close response bodies and read them safely; cap or stream large payloads where relevant.

    - path: "internal/provider/**/*_test.go"
      instructions: |
        Tests run against the in-memory fake API in `test_server_test.go` (`newFakeBunkerWebAPI`), which backs both unit tests (`client_core_test.go`) and acceptance tests — no live BunkerWeb is needed. Acceptance tests use the framework's `resource.Test` and require `TF_ACC=1` (via `make testacc`).
          - When behaviour changes, extend the fake server to match the real API's envelope (`{status, message, data}`) and routes; tests must not depend on a live service.
          - Prefer table-driven cases; assert observable state, imports, and plan stability (no unexpected diffs).
          - When a PR fixes a regression, ask for a test that fails before the fix and passes after it.
          - Respect the `usetesting` linter enabled in `.golangci.yml`: use `t.Context()`, `t.Setenv`, and `t.TempDir()` rather than rolling your own.

    - path: "**/*.go"
      instructions: |
        General Go quality and security, consistent with the linters enabled in `.golangci.yml` (errcheck, staticcheck, forcetypeassert, nilerr, unparam, makezero, copyloopvar, usetesting, godot, misspell, durationcheck, ineffassign, predeclared, unconvert, unused):
          - Check returned errors and wrap with context using `%w`. Do not ignore errors with `_` unless clearly justified.
          - Avoid unchecked type assertions (`x.(T)` without the comma-ok form); `forcetypeassert` will flag them.
          - Exported-symbol comments should be full sentences ending with a period (`godot`).
          - No secrets, tokens, or credentials hard-coded; read configuration from the provider schema or the `BUNKERWEB_API_*` env vars.
          - Set timeouts on outbound HTTP and bound any retry/backoff loop.

    - path: "examples/**/*.tf"
      instructions: |
        Terraform examples are consumed by `terraform-plugin-docs` to render `docs/`, so they are source, not throwaway fixtures:
          - Keep HCL valid and `terraform fmt`-clean; attribute names must match the current resource/data-source schema.
          - Use obvious placeholders for endpoints and secrets (`https://bunkerweb.example.com`, `var.api_token`); never commit real API tokens, credentials, or internal hostnames.
          - When a schema field is added, renamed, or removed, the matching example under `examples/<type>/<name>/` must be updated so the generated docs stay correct.

    - path: "templates/**/*.tmpl"
      instructions: |
        `templates/*.tmpl` drive `terraform-plugin-docs` output. Edit templates and `examples/`, never `docs/` directly:
          - Keep template functions and placeholders valid for tfplugindocs; a broken template breaks `make generate` and CI.
          - Verify changes here by running `make generate` and reviewing the resulting `docs/` diff.

    - path: "**/*.md"
      instructions: |
        Documentation should be concise, accurate, and written in British English. NOTE: everything under `docs/` is generated — do not hand-edit it; fix the schema, `examples/`, or `templates/` instead.
          - Keep a sensible heading hierarchy and prefer concrete instructions over narrative.
          - Check that commands, paths, the provider address (`registry.terraform.io/bunkerity/bunkerweb`), and version pins still match the repository.
          - When a PR changes behaviour, defaults, or schema, require the matching README/CHANGELOG update in the same PR.

    - path: "**/*.sh"
      instructions: |
        Shell scripts (for example `test-local/test-provider.sh`, `examples/resources/bunkerweb_service/import.sh`) must be portable and safe:
          - Prefer `set -eu` for POSIX shell and `set -euo pipefail` for Bash. Quote variables and command substitutions.
          - Handle failures explicitly; use `mktemp` and `trap` for cleanup of temporary files.
          - Never hard-code API tokens or credentials; read them from the environment (`BUNKERWEB_API_*`).
          - Never pipe a remote download straight into a shell; avoid `-k` / `--insecure`.

    - path: ".github/workflows/**/*.yml"
      instructions: &github_actions_instructions |
        GitHub Actions workflows must be reproducible and safe:
          - Pin third-party actions by commit SHA, not floating tags.
          - Declare an explicit top-level `permissions:` block and keep it minimal by default.
          - Be extremely careful with `pull_request_target`: do not combine untrusted PR code with repository secrets.
          - Do not interpolate `${{ github.event.* }}` values directly inside `run:` scripts; assign them via `env:` first to reduce script-injection risk.
          - Use `concurrency` intentionally: cancel superseded PR jobs, but never cancel release jobs that must run to completion.
          - The CI contract is lint + `make generate` (must produce no diff) + acceptance tests across a Terraform version matrix; keep it intact.

    - path: ".github/workflows/**/*.yaml"
      instructions: *github_actions_instructions

    - path: "**/*.yaml"
      instructions: &yaml_instructions |
        YAML files (CI, GoReleaser, dependabot, golangci-lint config) must be structured and reproducible:
          - Use consistent indentation, stable key ordering where the project already has one, and avoid duplicate keys.
          - Pin GitHub Actions, container images, and tool versions rather than using `latest`.
          - Never commit secrets in plaintext; use repository secrets or example placeholders.

    - path: "**/*.yml"
      instructions: *yaml_instructions

    - path: "go.mod"
      instructions: |
        Dependency changes:
          - Keep the Go version (`go 1.24.x`) and the `terraform-plugin-*` modules consistent; the provider targets the Plugin Framework. `terraform-plugin-sdk/v2` appears only as an indirect dependency — do not propose removing it or flag it as SDKv2 usage.
          - Justify new direct dependencies; prefer the standard library and existing HashiCorp framework helpers. Keep `go.sum` in sync.

  tools:
    github-checks:
      enabled: true
      timeout_ms: 120000
    golangci-lint:
      enabled: true
    languagetool:
      enabled: true
      level: "default"
    gitleaks:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    checkov:
      enabled: true
    tflint:
      enabled: true
    osvScanner:
      enabled: true
    dotenvLint:
      enabled: true
    # Not applicable to a Go + Terraform provider repository.
    luacheck:
      enabled: false
    hadolint:
      enabled: false
    htmlhint:
      enabled: false
    flake8:
      enabled: false
    ruff:
      enabled: false
    eslint:
      enabled: false
    stylelint:
      enabled: false
    semgrep:
      enabled: false
    biome:
      enabled: false

chat:
  auto_reply: true
